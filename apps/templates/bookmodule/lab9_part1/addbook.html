<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>
</head>
<body>

<h1>Add Book - Part 1</h1>

<form method="POST">
    {% csrf_token %}

    <label>Title:</label>
    <input type="text" name="title"><br><br>

    <label>Price:</label>
    <input type="number" step="0.01" name="price"><br><br>

    <label>Quantity:</label>
    <input type="number" name="quantity"><br><br>

    <label>Publication Date:</label>
    <input type="datetime-local" name="pubdate"><br><br>

    <label>Rating:</label>
    <input type="number" name="rating" min="1" max="5"><br><br>

    <label>Publisher:</label>
    <select name="publisher">
        {% for publisher in publishers %}
            <option value="{{ publisher.id }}">{{ publisher }}</option>
        {% endfor %}
    </select><br><br>

    <label>Authors:</label>
    <select name="authors" multiple>
        {% for author in authors %}
            <option value="{{ author.id }}">{{ author }}</option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Add Book</button>
</form>

<br>

<a href="{% url 'list_books_part1' %}">Back to List</a>

</body>
</html>
